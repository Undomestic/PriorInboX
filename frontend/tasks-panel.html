<!-- Task/Todo List Panel -->
<div id="tasksPanel" class="tasks-panel">
  <div class="panel-header">
    <h2>📋 My Tasks</h2>
    <button id="addTaskBtn" class="btn-icon" title="Add new task">➕</button>
    <button id="closeTasksPanel" class="btn-icon" title="Close panel">✕</button>
  </div>
  
  <div class="filter-buttons">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <div id="tasksList" class="tasks-list">
    <p class="empty-state">No tasks yet. Click ➕ to add one!</p>
  </div>
</div>

<!-- Add/Edit Task Modal -->
<div id="taskModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="taskModalTitle">Add New Task</h2>
      <button class="modal-close">&times;</button>
    </div>
    
    <div class="modal-body">
      <form id="taskForm">
        <div class="form-group">
          <label for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" required placeholder="What needs to be done?">
        </div>

        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" placeholder="Add more details..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskDueDate">Due Date</label>
            <input type="date" id="taskDueDate">
          </div>

          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button id="cancelTaskBtn" class="btn btn-secondary">Cancel</button>
      <button id="saveTaskBtn" class="btn btn-primary">Save Task</button>
    </div>
  </div>
</div>

<style>
/* Tasks Panel */
.tasks-panel {
  position: fixed;
  right: -400px;
  top: 60px;
  width: 400px;
  height: calc(100vh - 60px);
  background: var(--bg-secondary);
  border-left: 2px solid var(--border-color);
  box-shadow: -4px 0 12px rgba(0, 0, 0, 0.1);
  z-index: 999;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tasks-panel.show {
  right: 0;
}

.tasks-panel .panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.tasks-panel h2 {
  margin: 0;
  font-size: 1.3em;
}

.filter-buttons {
  display: flex;
  gap: 8px;
  padding: 15px 20px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.filter-btn {
  padding: 8px 16px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.9em;
}

.filter-btn:hover {
  color: var(--text-primary);
  border-color: var(--primary-color);
}

.filter-btn.active {
  background: var(--primary-color);
  color: white;
  border-color: var(--primary-color);
}

.tasks-list {
  flex: 1;
  overflow-y: auto;
  padding: 15px 20px;
}

.empty-state {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px 20px;
  font-style: italic;
}

.task-item {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.task-item:hover {
  border-color: var(--primary-color);
  box-shadow: 0 2px 8px rgba(52, 152, 219, 0.1);
}

.task-item.completed {
  opacity: 0.6;
}

.task-item.completed .task-title {
  text-decoration: line-through;
  color: var(--text-secondary);
}

.task-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.task-title {
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}

.task-priority {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75em;
  font-weight: 600;
  white-space: nowrap;
}

.task-priority.high {
  background: #ffebee;
  color: #c62828;
}

.task-priority.medium {
  background: #fff3e0;
  color: #e65100;
}

.task-priority.low {
  background: #e8f5e9;
  color: #2e7d32;
}

body.light .task-priority.high {
  background: #ffcdd2;
  color: #b71c1c;
}

body.light .task-priority.medium {
  background: #ffe0b2;
  color: #e65100;
}

body.light .task-priority.low {
  background: #c8e6c9;
  color: #1b5e20;
}

.task-description {
  font-size: 0.9em;
  color: var(--text-secondary);
  margin-bottom: 8px;
  line-height: 1.4;
  max-height: 50px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85em;
  color: var(--text-secondary);
}

.task-due-date {
  display: flex;
  align-items: center;
  gap: 4px;
}

.task-actions {
  display: flex;
  gap: 8px;
}

.task-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.1em;
  padding: 0;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.task-btn:hover {
  opacity: 1;
}

.btn-icon {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2em;
  padding: 4px 8px;
  border-radius: 4px;
  transition: all 0.2s;
  color: var(--text-secondary);
}

.btn-icon:hover {
  color: var(--primary-color);
  background: var(--bg-primary);
}

/* Modal Styles */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: var(--bg-secondary);
  border-radius: 8px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    transform: translateY(-20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.modal-header {
  padding: 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h2 {
  margin: 0;
}

.modal-close {
  background: none;
  border: none;
  font-size: 2em;
  cursor: pointer;
  color: var(--text-secondary);
}

.modal-body {
  padding: 20px;
}

.form-group {
  margin-bottom: 15px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
  color: var(--text-primary);
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 1em;
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
}

.modal-footer {
  padding: 20px;
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--primary-color);
  color: white;
}

.btn-primary:hover {
  background: #2980b9;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
}

.btn-secondary {
  background: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.btn-secondary:hover {
  background: var(--bg-hover);
}

/* Responsive */
@media (max-width: 768px) {
  .tasks-panel {
    width: 100%;
    right: -100%;
  }

  .modal-content {
    width: 95%;
  }

  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
// Task Manager Functions
let currentEditingTaskId = null;
let currentFilter = 'all';

// Toggle tasks panel
function toggleTasksPanel() {
  const panel = document.getElementById('tasksPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) {
    loadTasks();
  }
}

// Load tasks from API
async function loadTasks() {
  try {
    const response = await fetch(`${apiUrl}/tasks`, {
      headers: {
        'Authorization': `Bearer ${getToken()}`,
        'Content-Type': 'application/json'
      }
    });

    if (!response.ok) throw new Error('Failed to fetch tasks');

    let tasks = await response.json();
    
    // Filter tasks based on current filter
    if (currentFilter !== 'all') {
      tasks = tasks.filter(t => t.status === currentFilter);
    }

    renderTasks(tasks);
  } catch (error) {
    console.error('Error loading tasks:', error);
    showErrorAlert('Failed to load tasks');
  }
}

// Render tasks to the list
function renderTasks(tasks) {
  const tasksList = document.getElementById('tasksList');
  
  if (!tasks || tasks.length === 0) {
    tasksList.innerHTML = '<p class="empty-state">No tasks yet. Click ➕ to add one!</p>';
    return;
  }

  tasksList.innerHTML = tasks.map(task => `
    <div class="task-item ${task.status === 'completed' ? 'completed' : ''}" data-task-id="${task.id}">
      <div class="task-header">
        <div class="task-title">${escapeHtml(task.title)}</div>
        <span class="task-priority ${task.priority}">${task.priority}</span>
      </div>
      
      ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
      
      <div class="task-footer">
        <div class="task-due-date">
          ${task.due_date ? `📅 ${new Date(task.due_date).toLocaleDateString()}` : '<span style="color: transparent;">📅</span>'}
        </div>
        <div class="task-actions">
          ${task.status !== 'completed' ? `<button class="task-btn complete-task" title="Mark complete">✓</button>` : ''}
          <button class="task-btn edit-task" title="Edit">✎</button>
          <button class="task-btn delete-task" title="Delete">🗑</button>
        </div>
      </div>
    </div>
  `).join('');

  // Attach event listeners
  document.querySelectorAll('.complete-task').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const taskId = e.closest('.task-item').dataset.taskId;
      completeTask(taskId);
    });
  });

  document.querySelectorAll('.edit-task').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const taskId = e.closest('.task-item').dataset.taskId;
      editTask(taskId);
    });
  });

  document.querySelectorAll('.delete-task').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const taskId = e.closest('.task-item').dataset.taskId;
      deleteTask(taskId);
    });
  });

  document.querySelectorAll('.task-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (!e.target.classList.contains('task-btn')) {
        editTask(item.dataset.taskId);
      }
    });
  });
}

// Open add/edit task modal
function openTaskModal(taskId = null) {
  currentEditingTaskId = taskId;
  const modal = document.getElementById('taskModal');
  const form = document.getElementById('taskForm');
  const title = document.getElementById('taskModalTitle');

  form.reset();

  if (taskId) {
    title.textContent = 'Edit Task';
    // Load task data and populate form
    loadTaskForEdit(taskId);
  } else {
    title.textContent = 'Add New Task';
  }

  modal.classList.add('show');
}

// Load task for editing
async function loadTaskForEdit(taskId) {
  try {
    const response = await fetch(`${apiUrl}/tasks`, {
      headers: {
        'Authorization': `Bearer ${getToken()}`
      }
    });
    
    const tasks = await response.json();
    const task = tasks.find(t => t.id == taskId);

    if (task) {
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskDescription').value = task.description || '';
      document.getElementById('taskDueDate').value = task.due_date ? task.due_date.split('T')[0] : '';
      document.getElementById('taskPriority').value = task.priority;
    }
  } catch (error) {
    console.error('Error loading task:', error);
  }
}

// Save task
async function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  const description = document.getElementById('taskDescription').value.trim();
  const dueDate = document.getElementById('taskDueDate').value;
  const priority = document.getElementById('taskPriority').value;

  if (!title) {
    showErrorAlert('Title is required');
    return;
  }

  try {
    const url = currentEditingTaskId 
      ? `${apiUrl}/tasks/${currentEditingTaskId}`
      : `${apiUrl}/tasks`;
    
    const method = currentEditingTaskId ? 'PUT' : 'POST';

    const response = await fetch(url, {
      method,
      headers: {
        'Authorization': `Bearer ${getToken()}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title,
        description,
        due_date: dueDate || null,
        priority,
        status: 'pending'
      })
    });

    if (!response.ok) throw new Error('Failed to save task');

    showSuccessAlert(currentEditingTaskId ? '✓ Task updated!' : '✓ Task created!');
    document.getElementById('taskModal').classList.remove('show');
    loadTasks();
  } catch (error) {
    console.error('Error saving task:', error);
    showErrorAlert('Failed to save task');
  }
}

// Complete task
async function completeTask(taskId) {
  try {
    const response = await fetch(`${apiUrl}/tasks/${taskId}/complete`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${getToken()}`,
        'Content-Type': 'application/json'
      }
    });

    if (!response.ok) throw new Error('Failed to complete task');

    showSuccessAlert('✓ Task completed!');
    loadTasks();
  } catch (error) {
    console.error('Error completing task:', error);
    showErrorAlert('Failed to complete task');
  }
}

// Edit task
function editTask(taskId) {
  openTaskModal(taskId);
}

// Delete task
async function deleteTask(taskId) {
  if (!confirm('Are you sure you want to delete this task?')) return;

  try {
    const response = await fetch(`${apiUrl}/tasks/${taskId}`, {
      method: 'DELETE',
      headers: {
        'Authorization': `Bearer ${getToken()}`
      }
    });

    if (!response.ok) throw new Error('Failed to delete task');

    showSuccessAlert('✓ Task deleted!');
    loadTasks();
  } catch (error) {
    console.error('Error deleting task:', error);
    showErrorAlert('Failed to delete task');
  }
}

// Event Listeners
document.addEventListener('DOMContentLoaded', () => {
  // Close panel
  document.getElementById('closeTasksPanel').addEventListener('click', toggleTasksPanel);

  // Add task button
  document.getElementById('addTaskBtn').addEventListener('click', () => openTaskModal());

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      loadTasks();
    });
  });

  // Modal controls
  document.getElementById('cancelTaskBtn').addEventListener('click', () => {
    document.getElementById('taskModal').classList.remove('show');
  });

  document.getElementById('saveTaskBtn').addEventListener('click', saveTask);

  document.querySelector('.modal-close').addEventListener('click', () => {
    document.getElementById('taskModal').classList.remove('show');
  });

  // Close modal when clicking outside
  document.getElementById('taskModal').addEventListener('click', (e) => {
    if (e.target.id === 'taskModal') {
      document.getElementById('taskModal').classList.remove('show');
    }
  });
});

// Helper function to escape HTML
function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}
</script>
