<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - PriorInBox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./priorInboX-home.css">
  <style>
    .tasks-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .task-column {
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      min-height: 400px;
    }

    .task-column h3 {
      color: var(--accent);
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(63, 220, 255, 0.2);
    }

    .task-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(63, 220, 255, 0.2);
    }

    .task-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .task-title {
      flex: 1;
      color: var(--text);
      font-weight: 500;
    }

    .task-priority {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .task-priority.high {
      background: rgba(255, 75, 75, 0.2);
      color: #ff4b4b;
    }

    .task-priority.medium {
      background: rgba(255, 184, 75, 0.2);
      color: #ffb84b;
    }

    .task-priority.low {
      background: rgba(75, 255, 145, 0.2);
      color: #4bff91;
    }

    .task-due-date {
      font-size: 12px;
      color: var(--muted);
      margin: 8px 0;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .task-btn {
      flex: 1;
      padding: 8px;
      background: rgba(63, 220, 255, 0.1);
      border: 1px solid rgba(63, 220, 255, 0.3);
      color: var(--accent);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s;
    }

    .task-btn:hover {
      background: rgba(63, 220, 255, 0.2);
      box-shadow: 0 0 10px rgba(63, 220, 255, 0.3);
    }

    .task-btn.delete {
      background: rgba(255, 75, 75, 0.1);
      border-color: rgba(255, 75, 75, 0.3);
      color: #ff4b4b;
    }

    .task-btn.delete:hover {
      background: rgba(255, 75, 75, 0.2);
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-style: italic;
    }

    .add-task-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), rgba(63, 220, 255, 0.8));
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }

    .add-task-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(63, 220, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>MyPanel</h2>
      <ul>
        <li><a href="priorInboX-home.html">🏠 Home</a></li>
        <li><a href="emails.html">📨 Emails</a></li>
        <li class="active"><a href="tasks-management.html">✅ Tasks</a></li>
        <li><a href="account-settings.html">⚙️ Settings</a></li>
        <li><a href="about-us.html">👤 About Us</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Hamburger Menu for Mobile -->
      <button class="hamburger-menu" id="hamburgerMenu">☰</button>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Top -->
      <div class="topbar">
        <div>
          <h2>Task Management ✅</h2>
          <p class="user-info" id="userEmail"></p>
        </div>
        <div class="auth-buttons">
          <button class="theme-toggle" id="themeToggle">🌙</button>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Filters -->
      <div style="padding: 0 20px; margin-bottom: 10px; display: flex; justify-content: flex-end;">
        <select id="priorityFilter" onchange="applyFilters()" style="width: auto; cursor: pointer;">
          <option value="all">All Priorities</option>
          <option value="high">High Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="low">Low Priority</option>
        </select>
      </div>

      <!-- Task Columns -->
      <div class="tasks-container">
        <!-- To Do Column -->
        <div class="task-column">
          <h3>📋 To Do</h3>
          <div id="incompleteTasksContainer"></div>
          <button class="add-task-btn" onclick="showAddTaskModal('pending')">+ Add Task</button>
        </div>

        <!-- In Progress Column -->
        <div class="task-column">
          <h3>⚙️ In Progress</h3>
          <div id="inProgressTasksContainer"></div>
          <button class="add-task-btn" onclick="showAddTaskModal('in_progress')">+ Add Task</button>
        </div>

        <!-- Completed Column -->
        <div class="task-column">
          <h3>✅ Completed</h3>
          <div id="completedTasksContainer"></div>
          <p style="font-size: 12px; color: var(--muted); margin-top: 15px; text-align: center;">Click ↩️ to mark tasks as undone</p>
        </div>
      </div>
    </main>

    <!-- Task Edit Modal -->
    <div id="taskModal" class="calendar-modal">
      <div class="calendar-modal-content" style="max-width: 450px;">
        <span class="close-modal" onclick="closeTaskModal()">&times;</span>
        <div class="modal-header" style="margin-bottom: 20px;">
          <h2 id="taskModalTitle">Edit Task</h2>
        </div>
        <form id="taskForm" onsubmit="saveTask(event)">
          <input type="hidden" id="taskId">
          <div class="form-group">
            <label for="taskTitleInput">Task Title</label>
            <input type="text" id="taskTitleInput" required placeholder="Enter task title">
          </div>
          <div class="form-group">
            <label for="taskPriorityInput">Priority</label>
            <select id="taskPriorityInput">
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskStatusInput">Status</label>
            <select id="taskStatusInput">
              <option value="pending">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueDateInput">Due Date</label>
            <input type="date" id="taskDueDateInput">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2024 PriorInboX. All rights reserved.</p>
  </footer>

  <script>
    // Load user info on page load
    window.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const theme = localStorage.getItem('theme');
      
      document.getElementById('userEmail').textContent = user.email || 'user@example.com';
      
      if (theme === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeToggle').textContent = '☀️';
      }

      loadTasks();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);
      document.getElementById('logoutBtn').addEventListener('click', logout);
    }

    function toggleTheme() {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'form/form-home.html';
    }

    // Sample tasks data
    const sampleTasks = [
      { id: 1, title: 'Complete Project Report', priority: 'high', status: 'pending', due_date: '2026-01-10' },
      { id: 2, title: 'Review Code Changes', priority: 'medium', status: 'in_progress', due_date: '2026-01-08' },
      { id: 3, title: 'Team Meeting Notes', priority: 'low', status: 'completed', due_date: '2026-01-05' },
      { id: 4, title: 'Update Documentation', priority: 'high', status: 'pending', due_date: '2026-01-12' }
    ];

    function loadTasks() {
      let tasks = JSON.parse(localStorage.getItem('tasks') || JSON.stringify(sampleTasks));
      
      const priorityFilter = document.getElementById('priorityFilter');
      if (priorityFilter && priorityFilter.value !== 'all') {
        tasks = tasks.filter(t => t.priority === priorityFilter.value);
      }

      renderTasks(tasks);
    }

    function applyFilters() {
      loadTasks();
    }

    function renderTasks(tasks) {
      const incomplete = tasks.filter(t => t.status === 'pending');
      const inProgress = tasks.filter(t => t.status === 'in_progress');
      const completed = tasks.filter(t => t.status === 'completed');

      renderColumn('incompleteTasksContainer', incomplete);
      renderColumn('inProgressTasksContainer', inProgress);
      renderColumn('completedTasksContainer', completed);
    }

    function renderColumn(containerId, tasks) {
      const container = document.getElementById(containerId);
      const isCompletedColumn = containerId === 'completedTasksContainer';
      
      if (tasks.length === 0) {
        const emptyMsg = isCompletedColumn ? '🎉 No completed tasks yet' : 'No tasks yet';
        container.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
        return;
      }

      container.innerHTML = tasks.map(task => `
        <div class="task-item" data-task-id="${task.id}" style="${task.status === 'completed' ? 'opacity: 0.8;' : ''}">
          <div class="task-header">
            <input 
              type="checkbox" 
              class="task-checkbox"
              ${task.status === 'completed' ? 'checked' : ''}
              onchange="toggleTask(${task.id}, '${task.status}')"
            >
            <div class="task-title" style="${task.status === 'completed' ? 'text-decoration: line-through; opacity: 0.7;' : ''}">${task.title}</div>
          </div>
          <div class="task-priority ${task.priority}">${task.priority.toUpperCase()}</div>
          ${task.due_date ? `<div class="task-due-date">📅 ${new Date(task.due_date).toLocaleDateString()}</div>` : ''}
          <div class="task-actions">
            ${isCompletedColumn ? `<button class="task-btn" onclick="markTaskUndone(${task.id})" title="Mark as undone">↩️ Undo</button>` : `<button class="task-btn" onclick="editTask(${task.id})">Edit</button>`}
            <button class="task-btn delete" onclick="deleteTask(${task.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function toggleTask(taskId, currentStatus) {
      const tasks = JSON.parse(localStorage.getItem('tasks') || JSON.stringify(sampleTasks));
      const task = tasks.find(t => t.id === taskId);
      
      if (task) {
        task.status = currentStatus === 'completed' ? 'pending' : 'completed';
        updateTaskViaAPI(taskId, { status: task.status });
        localStorage.setItem('tasks', JSON.stringify(tasks));
        loadTasks();
      }
    }

    function markTaskUndone(taskId) {
      const tasks = JSON.parse(localStorage.getItem('tasks') || JSON.stringify(sampleTasks));
      const task = tasks.find(t => t.id === taskId);
      
      if (task) {
        task.status = 'pending';
        updateTaskViaAPI(taskId, { status: 'pending' });
        localStorage.setItem('tasks', JSON.stringify(tasks));
        loadTasks();
        showNotification('✅ Task marked as undone!');
      }
    }

    function updateTaskViaAPI(taskId, updates) {
      const token = localStorage.getItem('token');
      if (!token) return;

      fetch(`http://localhost:5000/api/tasks/${taskId}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(updates)
      }).catch(error => console.error('Error updating task:', error));
    }

    function showNotification(message) {
      const notif = document.createElement('div');
      notif.style.cssText = `
        position: fixed; top: 20px; right: 20px; 
        background: rgba(100, 200, 100, 0.9);
        color: white; padding: 15px 20px; 
        border-radius: 8px; z-index: 10000;
        font-weight: 500; animation: slideIn 0.3s ease;
      `;
      notif.textContent = message;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    function editTask(taskId) {
      const tasks = JSON.parse(localStorage.getItem('tasks') || JSON.stringify(sampleTasks));
      const task = tasks.find(t => t.id === taskId);
      
      if (task) {
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitleInput').value = task.title;
        document.getElementById('taskPriorityInput').value = task.priority;
        document.getElementById('taskStatusInput').value = task.status;
        document.getElementById('taskDueDateInput').value = task.due_date || '';
        
        document.getElementById('taskModalTitle').textContent = 'Edit Task';
        document.getElementById('taskModal').classList.add('show');
      }
    }

    function deleteTask(taskId) {
      if (confirm('Are you sure you want to delete this task?')) {
        const tasks = JSON.parse(localStorage.getItem('tasks') || JSON.stringify(sampleTasks));
        const filtered = tasks.filter(t => t.id !== taskId);
        localStorage.setItem('tasks', JSON.stringify(filtered));
        loadTasks();
      }
    }

    function showAddTaskModal(status) {
      document.getElementById('taskId').value = '';
      document.getElementById('taskForm').reset();
      document.getElementById('taskStatusInput').value = status || 'pending';
      document.getElementById('taskPriorityInput').value = 'medium';
      document.getElementById('taskModalTitle').textContent = 'Add New Task';
      document.getElementById('taskModal').classList.add('show');
    }

    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('show');
    }

    function saveTask(event) {
      event.preventDefault();
      const taskId = document.getElementById('taskId').value;
      const title = document.getElementById('taskTitleInput').value;
      const priority = document.getElementById('taskPriorityInput').value;
      const status = document.getElementById('taskStatusInput').value;
      const dueDate = document.getElementById('taskDueDateInput').value;

      let tasks = JSON.parse(localStorage.getItem('tasks') || JSON.stringify(sampleTasks));
      
      if (taskId) {
        const index = tasks.findIndex(t => t.id == taskId);
        if (index !== -1) {
          tasks[index] = { ...tasks[index], title, priority, status, due_date: dueDate };
        }
      } else {
        const newId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
        tasks.push({ id: newId, title, priority, status, due_date: dueDate });
      }

      localStorage.setItem('tasks', JSON.stringify(tasks));
      loadTasks();
      closeTaskModal();
    }
  </script>
  <script src="navbar.js"></script>
</body>
</html>
