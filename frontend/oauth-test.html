<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth Test - PriorInboX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
            font-size: 14px;
            color: #555;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-google {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
        }
        
        .btn-google:hover {
            background: #f9f9f9;
            border-color: #d0d0d0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-test {
            background: #667eea;
            color: white;
        }
        
        .btn-test:hover {
            background: #5568d3;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .google-logo {
            width: 20px;
            height: 20px;
        }
        
        .status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.pending {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Google OAuth Test</h1>
        <p class="subtitle">PriorInboX OAuth Configuration</p>
        
        <div class="info-box">
            ✅ Google OAuth credentials are configured and the backend server is running.
        </div>
        
        <div class="button-group">
            <button class="btn btn-google" onclick="testOAuthLogin()">
                <svg class="google-logo" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>
            
            <button class="btn btn-test" onclick="testAPI()">
                🧪 Test API Endpoint
            </button>
        </div>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        // Check if returning from OAuth callback
        function checkOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const user = params.get('user');
            
            if (token) {
                const status = document.getElementById('status');
                status.className = 'status success';
                status.innerHTML = `
                    <strong>✅ OAuth Success!</strong><br>
                    Token: <code>${token.substring(0, 20)}...</code><br>
                    <br>
                    User logged in successfully. You can now use this token for API requests.
                `;
                status.style.display = 'block';
                
                // Save token to localStorage
                localStorage.setItem('auth_token', token);
                
                // Redirect to dashboard after 3 seconds
                setTimeout(() => {
                    window.location.href = 'http://localhost:8000/priorInboX-home.html';
                }, 3000);
            }
        }
        
        function testOAuthLogin() {
            window.location.href = 'http://localhost:5000/api/auth/google';
        }
        
        async function testAPI() {
            const status = document.getElementById('status');
            status.className = 'status pending';
            status.innerHTML = '⏳ Testing API connection...';
            status.style.display = 'block';
            
            try {
                const response = await fetch('http://localhost:5000/api/health', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    status.className = 'status success';
                    status.innerHTML = `
                        <strong>✅ API Connection Successful!</strong><br>
                        Message: ${data.message}<br>
                        Timestamp: ${new Date(data.timestamp).toLocaleString()}
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `
                    <strong>❌ API Connection Failed!</strong><br>
                    Error: ${error.message}<br>
                    <br>
                    Make sure the backend server is running on <code>http://localhost:5000</code>
                `;
            }
        }
        
        // Check on page load
        window.addEventListener('load', checkOAuthCallback);
    </script>
</body>
</html>
